name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      # kotoba.webgl re-exports kami.webgl (kotoba-lang/webgpu) — see CHANGELOG.md — so the
      # sibling checkout is webgpu (+ its own transitive local/root deps) instead of the old
      # direct gpu/sprite-gpu/wgsl siblings.
      - run: git clone --depth 1 https://github.com/kotoba-lang/webgpu.git ../webgpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/org-w3-webgpu.git ../org-w3-webgpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/expr.git ../expr
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-
      - run: clojure -M:test

      - run: clojure -M:lint
