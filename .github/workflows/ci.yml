name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - name: Checkout local-root dependency graph
        run: |
          for repo in webgpu org-w3-webgpu wgsl expr sprite-gpu sprite2d sky shaders render-shaders scene2d gpu dance physics physics-2d fsm netsync pipelines level host playwright cartpole-math kami-engine-sdk; do
            git clone --depth 1 "https://github.com/kotoba-lang/${repo}.git" "../${repo}"
          done
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-
      - run: clojure -M:test

      - run: clojure -M:lint
